name: Release
on:
  push:
    tags:
      - 'v[0-9]+.*'
permissions:
  contents: write
jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract release notes
        id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v2

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.extract-release-notes.outputs.release_notes }}

  build-release:
    name: build-release
    needs: ['create-release']
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - build: linux
            os: ubuntu-latest
            rust: stable
            target: x86_64-unknown-linux-gnu
          - build: macos
            os: macos-latest
            rust: stable
            target: x86_64-apple-darwin
          - build: macos-arm
            os: macos-latest
            rust: stable
            target: aarch64-apple-darwin
          - build: windows
            os: windows-latest
            rust: stable
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          target: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Archive binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar czvf smart-diff-ci-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release smart-diff-ci

      - name: Archive binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/smart-diff-ci.exe -DestinationPath smart-diff-ci-${{ matrix.target }}.zip

      - name: Upload release archive (Unix)
        if: matrix.os != 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: smart-diff-ci-${{ matrix.target }}.tar.gz

      - name: Upload release archive (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: smart-diff-ci-${{ matrix.target }}.zip

  update-homebrew:
    needs: ['build-release']
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: dhia-bechattaoui/homebrew-smart-diff-ci
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-smart-diff-ci

      - name: Update Formula
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Updating to version $VERSION"
          
          cd homebrew-smart-diff-ci

          MAC_INTEL_URL="https://github.com/dhia-bechattaoui/smart-diff-ci/releases/download/${GITHUB_REF_NAME}/smart-diff-ci-x86_64-apple-darwin.tar.gz"
          MAC_ARM_URL="https://github.com/dhia-bechattaoui/smart-diff-ci/releases/download/${GITHUB_REF_NAME}/smart-diff-ci-aarch64-apple-darwin.tar.gz"
          LINUX_URL="https://github.com/dhia-bechattaoui/smart-diff-ci/releases/download/${GITHUB_REF_NAME}/smart-diff-ci-x86_64-unknown-linux-gnu.tar.gz"

          # Wait for release assets to propagate
          sleep 10

          curl -sL $MAC_INTEL_URL -o mac-intel.tar.gz
          curl -sL $MAC_ARM_URL -o mac-arm.tar.gz
          curl -sL $LINUX_URL -o linux.tar.gz

          MAC_INTEL_SHA=$(sha256sum mac-intel.tar.gz | awk '{ print $1 }')
          MAC_ARM_SHA=$(sha256sum mac-arm.tar.gz | awk '{ print $1 }')
          LINUX_SHA=$(sha256sum linux.tar.gz | awk '{ print $1 }')

          cat <<EOF > Formula/smart-diff-ci.rb
          class SmartDiffCi < Formula
            desc "Blazing fast, language-agnostic Test Impact Analyzer"
            homepage "https://github.com/dhia-bechattaoui/smart-diff-ci"
            version "$VERSION"
            license "MIT"

            if OS.mac?
              if Hardware::CPU.arm?
                url "$MAC_ARM_URL"
                sha256 "$MAC_ARM_SHA"
              else
                url "$MAC_INTEL_URL"
                sha256 "$MAC_INTEL_SHA"
              end
            elsif OS.linux?
              url "$LINUX_URL"
              sha256 "$LINUX_SHA"
            end

            def install
              bin.install "smart-diff-ci"
            end

            test do
              system "#{bin}/smart-diff-ci", "--version"
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/smart-diff-ci.rb
          git commit -m "chore: bump version to ${GITHUB_REF_NAME}"
          git push origin main

  publish-npm:
    needs: ['build-release']
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish NPM Wrapper
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Publishing version $VERSION"
          
          cd npm
          
          # Update package.json version
          npm version $VERSION --no-git-tag-version --allow-same-version
          
          # Update install.js version
          sed -i "s/const VERSION = '.*';/const VERSION = 'v$VERSION';/" install.js
          
          # Publish to NPM using the token
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
